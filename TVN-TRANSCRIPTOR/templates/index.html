<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glow-pulse {
            border-color: #E2001A !important;
            background-color: #1a2436 !important;
            box-shadow: 0 0 25px rgba(226, 0, 26, 0.5);
        }
    </style>
</head>
<body class="bg-[#121824] text-white font-sans min-h-screen flex flex-col justify-between">

    <header class="p-6 border-b border-gray-800 flex justify-between items-center bg-[#0b0f19]">
        <div class="flex items-center gap-3">
            <div class="w-4 h-4 bg-[#E2001A] rounded-full animate-pulse"></div>
            <div>
                <h1 class="text-xl font-bold tracking-wider text-white">24 HORAS</h1>
                <p class="text-xs text-gray-400">Transcriptor de Prensa IA</p>
            </div>
        </div>
        <span class="bg-emerald-950 text-emerald-400 border border-emerald-800 text-xs px-3 py-1 rounded-full font-medium">
            ● Sistema Activo
        </span>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-6 w-full max-w-4xl mx-auto">
        <div class="text-center max-w-2xl mb-6">
            <h2 class="text-3xl font-extrabold mb-1 tracking-tight">Transcribir Audio / Video</h2>
            <p class="text-gray-400 text-xs">Sube o arrastra tus archivos multimedia. La transcripción iniciará automáticamente.</p>
        </div>

        <div id="dropzone" class="w-full bg-[#161f30] border-2 border-dashed border-gray-700 rounded-xl p-8 flex flex-col items-center justify-center shadow-2xl transition-all duration-200 min-h-[220px] cursor-pointer group hover:border-[#E2001A]">
            
            <input type="file" id="fileInput" accept="video/*,audio/*" class="hidden">
